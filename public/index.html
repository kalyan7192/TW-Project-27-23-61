<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Signup</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
            position: relative;
        }

        body::before,
        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.15);
            filter: blur(80px);
            animation: float 8s infinite alternate ease-in-out;
        }

        body::after {
            background: rgba(255, 0, 255, 0.15);
            right: -100px;
            bottom: -100px;
            animation-delay: 3s;
        }

        body::before {
            left: -100px;
            top: -100px;
        }

        @keyframes float {
            from {
                transform: translateY(0px) translateX(0px);
            }

            to {
                transform: translateY(40px) translateX(30px);
            }
        }

        .custom-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            z-index: 10000;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            min-width: 320px;
            text-align: center;
            animation: popupFade 0.3s ease;
        }

        .custom-popup.success {
            border-left: 5px solid #38ef7d;
        }

        .custom-popup.error {
            border-left: 5px solid #ff416c;
        }

        .custom-popup.info {
            border-left: 5px solid #00dbde;
        }

        .custom-popup p {
            color: white;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .custom-popup button {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .custom-popup button:hover {
            transform: scale(1.05);
        }

        @keyframes popupFade {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            backdrop-filter: blur(20px);
            overflow: visible;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-box {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px;
            transition: 0.8s ease-in-out;
            z-index: 2;
        }

        .login {
            left: 0;
        }

        .signup {
            right: -100%;
        }

        .container.active .login {
            left: -100%;
        }

        .container.active .signup {
            right: 0;
        }

        h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .input-box {
            width: 100%;
            margin: 12px 0;
            position: relative;
        }

        .input-box input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.03);
            box-shadow: 0 0 15px cyan;
        }

        .input-box input::placeholder {
            color: #ddd;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s;
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.4);
        }

        .toggle-box {
            position: absolute;
            width: 50%;
            height: 100%;
            right: 0;
            background: linear-gradient(135deg, #00dbde, #fc00ff);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            text-align: center;
            padding: 40px;
            transition: 0.8s ease-in-out;
            z-index: 1;
        }

        .toggle-box h1 {
            font-size: 38px;
            margin-bottom: 15px;
        }

        .toggle-btn {
            padding: 12px 35px;
            border: 2px solid #fff;
            background: transparent;
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }

        .toggle-btn:hover {
            background: #fff;
            color: #111;
            transform: scale(1.08);
        }

        .container.active .toggle-box {
            right: 50%;
        }

        @media(max-width:768px) {
            .container {
                width: 95%;
                min-height: 650px;
            }

            .form-box,
            .toggle-box {
                width: 100%;
                position: relative;
            }

            .toggle-box {
                height: 220px;
            }

            .signup {
                display: none;
            }

            .container.active .signup {
                display: flex;
            }

            .container.active .login {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="container">
        <div class="form-box login">
            <h2>Login</h2>
            <div class="input-box">
                <input type="text" id="loginUsername" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>
            <button class="btn" id="loginBtn">Login</button>
        </div>

        <div class="form-box signup">
            <h2>Create Account</h2>
            <div class="input-box">
                <input type="text" id="signupName" placeholder="Full Name" required>
            </div>
            <div class="input-box">
                <input type="text" id="signupUsername" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="password" id="signupPassword" placeholder="Password" required>
            </div>
            <button class="btn" id="signupBtn">Sign Up</button>
        </div>

        <div class="toggle-box">
            <h1>Welcome... User !</h1>
            <button class="toggle-btn" id="toggle">Create Account</button>
        </div>
    </div>

    <div id="customPopup" class="custom-popup">
        <p id="popupMessage"></p>
        <button onclick="closePopup()">OK</button>
    </div>

    <script>
        // ========== IMPORTANT: REPLACE WITH YOUR ACTUAL RENDER BACKEND URL ==========
        // Example: const API_BASE_URL = "https://sticky-notes-backend.onrender.com";
        const API_BASE_URL = "https://tw-backend-rdqe.onrender.com";
        // ============================================================================

        const container = document.getElementById('container');
        const toggleBtn = document.getElementById('toggle');
        let signupMode = false;

        function showPopup(message, type = "info") {
            const popup = document.getElementById("customPopup");
            const popupMessage = document.getElementById("popupMessage");
            popupMessage.innerText = message;
            popup.className = `custom-popup ${type}`;
            popup.style.display = "block";

            if (type !== "error") {
                setTimeout(() => {
                    popup.style.display = "none";
                }, 3000);
            }
        }

        function closePopup() {
            document.getElementById("customPopup").style.display = "none";
        }

        toggleBtn.addEventListener('click', () => {
            signupMode = !signupMode;
            container.classList.toggle('active');
            toggleBtn.innerText = signupMode ? "Back to Login" : "Create Account";
        });

        // Signup Function
        document.getElementById("signupBtn").addEventListener("click", async () => {
            const name = document.getElementById("signupName").value.trim();
            const username = document.getElementById("signupUsername").value.trim();
            const password = document.getElementById("signupPassword").value;

            if (!name || !username || !password) {
                showPopup("Please fill all fields", "error");
                return;
            }

            const btn = document.getElementById("signupBtn");
            const originalText = btn.innerText;
            btn.innerText = "Creating...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, username, password })
                });

                const data = await response.json();
                showPopup(data.message, data.success ? "success" : "error");

                if (data.success) {
                    document.getElementById("signupName").value = "";
                    document.getElementById("signupUsername").value = "";
                    document.getElementById("signupPassword").value = "";
                    signupMode = false;
                    container.classList.remove('active');
                    toggleBtn.innerText = "Create Account";
                }
            } catch (error) {
                console.error("Signup error:", error);
                showPopup("Cannot connect to server. Please check if backend is running.", "error");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        // Login Function
        document.getElementById("loginBtn").addEventListener("click", async () => {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value;

            if (!username || !password) {
                showPopup("Please fill all fields", "error");
                return;
            }

            const btn = document.getElementById("loginBtn");
            const originalText = btn.innerText;
            btn.innerText = "Logging in...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem("loggedInUser", data.user.name);
                    localStorage.setItem("loggedInUsername", data.user.username);
                    showPopup("Login Successful! Redirecting...", "success");
                    setTimeout(() => {
                        window.location.href = "main.html";
                    }, 1500);
                } else {
                    showPopup(data.message, "error");
                }
            } catch (error) {
                console.error("Login error:", error);
                showPopup("Cannot connect to server. Please check if backend is running.", "error");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
